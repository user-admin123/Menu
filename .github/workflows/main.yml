on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_packages:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install project dependencies
      - name: Install dependencies
        run: npm install

      # Install Supabase client (ensure it's installed)
      - name: Install supabase
        run: npm install @supabase/supabase-js

      # Install bun to resolve bun not found error
      - name: Install bun
        run: curl -fsSL https://bun.sh/install | bash

      # Add bun to PATH (if necessary, to make it accessible)
      - name: Add bun to PATH
        run: echo "$HOME/.bun/bin" >> $GITHUB_PATH

      # Run the Browserslist DB update command
      - name: Update Browserslist DB
        run: npx update-browserslist-db@latest

      # Commit changes if any
      - name: Commit changes
        run: |
          # Configure Git user
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add changes to git
          git add package.json package-lock.json
          
          # Commit changes (if any)
          git commit -m "Update Browserslist database and package-lock.json" || echo "No changes to commit"
          
          # Push the changes to the repository
          git push
